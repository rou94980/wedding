<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Benny & Cindy wedding invitation"
    />
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          const decoded = location.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(
            null,
            '',
            location.pathname.replace(/\/$/, '') + decoded + location.hash,
          );
        }
      })(window.location);
    </script>
    <title>Benny & Cindy | Wedding Invitation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
